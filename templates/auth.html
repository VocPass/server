<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include "partials/seo.html" %}
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.25.0/pocketbase.umd.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Noto Sans TC"', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f7ff',
                            100: '#e0effe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --apple-text: #1d1d1f;
            --apple-secondary: #86868b;
            --bg-gray: #fbfbfd;
        }
        body { background-color: var(--bg-gray); color: var(--apple-text); }

        .glass-nav {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .bento-card {
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.03);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>

<body class="antialiased overflow-x-hidden">
    {% include "partials/nav.html" %}

    <div class="min-h-screen flex items-center justify-center px-5 pt-14">
        <div class="w-full max-w-sm">

            <!-- 登入卡片 -->
            <div id="login-card" class="bento-card p-8">
                <div class="text-center mb-8">
                    <img src="https://cdn.vocpass.com/iconr.png" alt="VocPass"
                        class="w-14 h-14 rounded-2xl object-cover mx-auto mb-4 shadow-sm">
                    <h1 class="text-2xl font-bold tracking-tight mb-1">登入 VocPass</h1>
                    <p class="text-sm text-gray-500">使用第三方帳號快速登入</p>
                </div>

                <div class="space-y-3">
                    <button onclick="login('google')" type="button"
                        class="w-full flex items-center justify-center gap-3 px-5 py-3.5 rounded-2xl font-semibold text-[15px] bg-white border border-gray-200 text-gray-900 hover:bg-gray-50 transition-all">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5">
                        使用 Google 登入
                    </button>

                    <button onclick="login('discord')" type="button"
                        class="w-full flex items-center justify-center gap-3 px-5 py-3.5 rounded-2xl font-semibold text-[15px] text-white transition-all hover:opacity-90"
                        style="background:#5865F2;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 127.14 96.36" fill="#fff">
                            <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z" />
                        </svg>
                        使用 Discord 登入
                    </button>
                </div>

                <p class="text-xs text-center mt-6 leading-relaxed text-gray-500">
                    登入即表示您同意
                    <a href="/privacy-policy" class="text-blue-600 hover:underline">隱私權政策</a>
                    與 <a href="/disclaimer" class="text-blue-600 hover:underline">免責聲明</a>
                </p>
            </div>

            <!-- 確認使用者卡片 -->
            <div id="user-info" class="hidden bento-card p-8 text-center">
                <div id="user-info-content"></div>
            </div>

        </div>
    </div>
    {% include "partials/footer.html" %}

    <script>
        const pb = new PocketBase('https://api.vocpass.com');

        async function login(m) {
            const authData = await pb.collection('users').authWithOAuth2({ provider: m });
            if (pb.authStore.isValid) {
                showUserInfo(pb.authStore.model);
            } else {
                alert("登入失敗！");
            }
        }

        function showUserInfo(userData) {
            document.getElementById('login-card').classList.add('hidden');
            const userInfoDiv = document.getElementById('user-info');
            const avatarUrl = pb.files.getUrl(userData, userData.avatar);
            document.getElementById('user-info-content').innerHTML = `
                <img src="${avatarUrl}" alt="頭像"
                    class="w-20 h-20 rounded-full mx-auto mb-4 object-cover"
                    style="border:3px solid #fbfbfd;">
                <p class="text-xl font-bold tracking-tight mb-1">${userData.name || userData.username || '使用者'}</p>
                <p class="text-sm mb-6 text-gray-500">這是你嗎？</p>
                <div class="flex gap-3 justify-center">
                    <button onclick="confirmUser()"
                        class="flex-1 px-5 py-3 rounded-full font-semibold text-sm bg-blue-600 text-white hover:bg-blue-700 transition-colors">
                        是
                    </button>
                    <button onclick="notUser()"
                        class="flex-1 px-5 py-3 rounded-full font-semibold text-sm bg-gray-100 text-gray-900 hover:bg-gray-200 transition-colors">
                        否
                    </button>
                </div>
            `;
            userInfoDiv.classList.remove('hidden');
        }

        function notUser() {
            pb.authStore.clear();
            location.reload();
        }

        function confirmUser() {
            if (location.search) {
                const params = new URLSearchParams(location.search);
                if (params.get('web') == 1) {
                    location.href = `/me`;
                    return;
                }
            }
            location.href = `vocpass://auth?token=${pb.authStore.token}`;
        }

        async function checkAuth() {
            if (pb.authStore.isValid) {
                await pb.collection('users').authRefresh();
                showUserInfo(pb.authStore.model);
            }
        }

        checkAuth();

        // 導覽列捲動效果
        const nav = document.querySelector('nav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                nav.classList.add('shadow-sm');
                nav.style.background = 'rgba(255, 255, 255, 0.85)';
            } else {
                nav.classList.remove('shadow-sm');
                nav.style.background = 'rgba(255, 255, 255, 0.65)';
            }
        });
    </script>

</body>

</html>
