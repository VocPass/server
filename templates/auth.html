<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocPass | 登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="https://github.com/vocpass.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.25.0/pocketbase.umd.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Noto Sans TC"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-blue-hover: #0077ed;
            --apple-text: #1d1d1f;
            --apple-secondary: #6e6e73;
        }

        .apple-nav {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body style="background:#f5f5f7; color:#1d1d1f;" class="antialiased overflow-x-hidden">

    <!-- 導覽列 -->
    <nav class="apple-nav fixed w-full z-50 transition-all duration-300" style="height:44px;">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full">
            <div class="flex justify-between h-full items-center">
                <a href="/" class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                    <img src="https://github.com/vocpass.png" alt="VocPass" class="w-6 h-6 rounded-md object-cover">
                    <span class="font-semibold text-sm tracking-tight" style="color:#1d1d1f;">VocPass</span>
                </a>
                <div class="hidden md:flex items-center gap-6">
                    <a href="/#features" class="text-sm transition-colors" style="color:#6e6e73;">功能特色</a>
                    <a href="/#schools" class="text-sm transition-colors" style="color:#6e6e73;">支援學校</a>
                    <a href="/#install" class="text-sm transition-colors" style="color:#6e6e73;">立即下載</a>
                    <a href="https://github.com/VocPass" target="_blank"
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold"
                        style="background:#1d1d1f; color:#fff;">
                        <i class="fa-brands fa-github"></i> GitHub
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主內容 -->
    <div class="min-h-screen flex items-center justify-center px-4" style="padding-top:44px;">
        <div class="w-full max-w-sm">

            <!-- 登入卡片 -->
            <div id="login-card" class="bg-white rounded-2xl p-8" style="box-shadow:0 4px 24px rgba(0,0,0,0.06);">
                <div class="text-center mb-8">
                    <img src="https://github.com/vocpass.png" alt="VocPass"
                        class="w-14 h-14 rounded-2xl object-cover mx-auto mb-4">
                    <h1 class="text-2xl font-bold tracking-tight" style="color:#1d1d1f; letter-spacing:-0.02em;">登入
                        VocPass</h1>
                    <p class="text-sm mt-2" style="color:#6e6e73;">使用第三方帳號快速登入</p>
                </div>

                <div class="space-y-3">
                    <button onclick="login('google')" type="button"
                        class="w-full flex items-center justify-center gap-3 px-5 py-3.5 rounded-2xl font-semibold transition-all"
                        style="font-size:15px; background:#fff; border:1px solid rgba(0,0,0,0.12); color:#1d1d1f;">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5">
                        使用 Google 登入
                    </button>

                    <button onclick="login('discord')" type="button"
                        class="w-full flex items-center justify-center gap-3 px-5 py-3.5 rounded-2xl font-semibold transition-all"
                        style="font-size:15px; background:#5865F2; color:#fff;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 127.14 96.36"
                            fill="#fff">
                            <path
                                d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z" />
                        </svg>
                        使用 Discord 登入
                    </button>
                </div>

                <p class="text-xs text-center mt-6 leading-relaxed" style="color:#6e6e73;">
                    登入即表示您同意
                    <a href="/privacy-policy" style="color:#0071e3;" class="hover:underline">隱私權政策</a>
                    與 <a href="/disclaimer" style="color:#0071e3;" class="hover:underline">免責聲明</a>
                </p>
            </div>

            <!-- 確認使用者卡片 -->
            <div id="user-info" class="hidden bg-white rounded-2xl p-8 text-center"
                style="box-shadow:0 4px 24px rgba(0,0,0,0.06);">
                <div id="user-info-content"></div>
            </div>

        </div>
    </div>

    <script>
        const pb = new PocketBase('https://vppb.zeabur.app');

        async function login(m) {
            const authData = await pb.collection('users').authWithOAuth2({ provider: m });
            if (pb.authStore.isValid) {
                showUserInfo(pb.authStore.model);
            } else {
                alert("登入失敗！");
            }
        }

        function showUserInfo(userData) {
            document.getElementById('login-card').classList.add('hidden');
            const userInfoDiv = document.getElementById('user-info');
            const avatarUrl = pb.files.getUrl(userData, userData.avatar);
            document.getElementById('user-info-content').innerHTML = `
                <img src="${avatarUrl}" alt="頭像"
                    class="w-20 h-20 rounded-full mx-auto mb-4 object-cover"
                    style="border:3px solid #f5f5f7;">
                <p class="text-xl font-bold tracking-tight mb-1" style="color:#1d1d1f;">${userData.name || userData.username || '使用者'}</p>
                <p class="text-sm mb-6" style="color:#6e6e73;">這是你嗎？</p>
                <div class="flex gap-3 justify-center">
                    <button onclick="confirmUser()"
                        class="flex-1 px-5 py-3 rounded-full font-semibold text-sm transition-colors"
                        style="background:#0071e3; color:#fff;">
                        是
                    </button>
                    <button onclick="notUser()"
                        class="flex-1 px-5 py-3 rounded-full font-semibold text-sm transition-colors"
                        style="background:rgba(0,0,0,0.06); color:#1d1d1f;">
                        否
                    </button>
                </div>
            `;
            userInfoDiv.classList.remove('hidden');
        }

        function notUser() {
            pb.authStore.clear();
            location.reload();
        }

        function confirmUser() {
            if (location.search) {
                const params = new URLSearchParams(location.search);
                if (params.get('web') == 1) {
                    location.href = `/me`;
                    return;
                }
            }
            location.href = `vocpass://auth?token=${pb.authStore.token}`;
        }

        async function checkAuth() {

            if (pb.authStore.isValid) {
                await pb.collection('users').authRefresh();
                showUserInfo(pb.authStore.model);
            }
        }

        checkAuth();
    </script>

</body>

</html>
