<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocPass | 登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://github.com/vocpass.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.25.0/pocketbase.umd.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .hero-pattern {
            background-color: #f0f4ff;
            background-image: radial-gradient(#c7d2fe 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased overflow-x-hidden">

    <!-- 導覽列 -->
    <nav class="fixed w-full z-50 glass-nav border-b border-indigo-100 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="/" class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                    <img src="https://github.com/vocpass.png" alt="VocPass"
                        class="w-8 h-8 rounded-lg object-cover border border-indigo-200">
                    <span class="font-bold text-xl tracking-wider">VocPass</span>
                </a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="/#features" class="text-gray-600 hover:text-indigo-600 transition-colors">功能特色</a>
                    <a href="/#schools" class="text-gray-600 hover:text-indigo-600 transition-colors">支援學校</a>
                    <a href="/#install" class="text-gray-600 hover:text-indigo-600 transition-colors">立即下載</a>
                    <a href="https://github.com/VocPass" target="_blank"
                        class="flex items-center gap-2 px-4 py-2 bg-slate-900 text-white rounded-full text-sm font-medium hover:bg-slate-700 transition-colors">
                        <i class="fa-brands fa-github"></i> GitHub
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主內容 -->
    <div class="hero-pattern min-h-screen flex items-center justify-center px-4 pt-16">
        <div class="w-full max-w-sm">

            <!-- 登入卡片 -->
            <div id="login-card" class="bg-white rounded-3xl border border-slate-200 shadow-sm p-8">
                <div class="text-center mb-8">
                    <img src="https://github.com/vocpass.png" alt="VocPass"
                        class="w-14 h-14 rounded-2xl object-cover border border-indigo-200 mx-auto mb-4">
                    <h1 class="text-2xl font-black tracking-tight text-slate-900">登入 VocPass</h1>
                    <p class="text-slate-500 text-sm mt-2">使用第三方帳號快速登入</p>
                </div>

                <div class="space-y-3">
                    <button onclick="login('google')" type="button"
                        class="w-full flex items-center justify-center gap-3 px-5 py-3.5 bg-white border border-slate-200 text-slate-700 rounded-2xl font-semibold hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5">
                        使用 Google 登入
                    </button>

                    <button onclick="login('discord')" type="button"
                        class="w-full flex items-center justify-center gap-3 px-5 py-3.5 bg-indigo-600 text-white rounded-2xl font-semibold hover:bg-indigo-500 transition-all shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 127.14 96.36" fill="#fff">
                            <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z" />
                        </svg>
                        使用 Discord 登入
                    </button>
                </div>

                <p class="text-slate-400 text-xs text-center mt-6 leading-relaxed">
                    登入即表示您同意 <a href="/privacy-policy" class="text-indigo-500 hover:underline">隱私權政策</a>
                    與 <a href="/disclaimer" class="text-indigo-500 hover:underline">免責聲明</a>
                </p>
            </div>

            <!-- 確認使用者卡片 -->
            <div id="user-info" class="hidden bg-white rounded-3xl border border-slate-200 shadow-sm p-8 text-center">
                <div id="user-info-content"></div>
            </div>

        </div>
    </div>

    <script>
        const pb = new PocketBase('https://vppb.zeabur.app');

        async function login(m) {
            const authData = await pb.collection('users').authWithOAuth2({ provider: m });
            if (pb.authStore.isValid) {
                showUserInfo(pb.authStore.model);
            } else {
                alert("登入失敗！");
            }
        }

        function showUserInfo(userData) {
            document.getElementById('login-card').classList.add('hidden');
            const userInfoDiv = document.getElementById('user-info');
            const avatarUrl = pb.files.getUrl(userData, userData.avatar);
            document.getElementById('user-info-content').innerHTML = `
                <img src="${avatarUrl}" alt="頭像"
                    class="w-20 h-20 rounded-full mx-auto mb-4 border-4 border-indigo-100 shadow-md object-cover">
                <p class="text-xl font-bold text-slate-900 mb-1">${userData.name || userData.username || '使用者'}</p>
                <p class="text-slate-500 text-sm mb-6">這是你嗎？</p>
                <div class="flex gap-3 justify-center">
                    <button onclick="confirmUser()"
                        class="flex-1 px-5 py-3 bg-indigo-600 text-white rounded-2xl font-semibold hover:bg-indigo-500 transition-colors">
                        是
                    </button>
                    <button onclick="notUser()"
                        class="flex-1 px-5 py-3 bg-slate-100 text-slate-700 rounded-2xl font-semibold hover:bg-slate-200 transition-colors">
                        否
                    </button>
                </div>
            `;
            userInfoDiv.classList.remove('hidden');
        }

        function notUser() {
            pb.authStore.clear();
            location.reload();
        }

        function confirmUser() {
            if (location.search) {
                const params = new URLSearchParams(location.search);
                if (params.get('web') == 1) {
                    location.href = `/me`;
                    return;
                }
            }
            location.href = `vocpass://auth?token=${pb.authStore.token}`;
        }

        async function checkAuth() {
            if (pb.authStore.isValid) {
                showUserInfo(pb.authStore.model);
            }
        }

        checkAuth();
    </script>

</body>

</html>
