<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocPass</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.25.0/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
            width: 90%;
            max-width: 340px;
            box-sizing: border-box;
        }

        .login-card h2 {
            margin: 0 0 24px 0;
            text-align: center;
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.2s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1a1a1a;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #1a1a1a;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #333333;
        }
    </style>
</head>

<body>

    <div class="login-card" id="login-card">
        <h2>第三方登入</h2>
        <div onclick="login('google')" style="text-decoration:none;">
            <button type="button" class="login-btn"
                style="background:#fff; color:#444; border:1px solid #e0e0e0; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:16px;">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google"
                    style="width:20px; height:20px;"> 使用 Google 登入
            </button>
        </div>
        <div onclick="login('discord')" style="text-decoration:none;">
            <button type="button" class="login-btn"
                style="background:#5865F2; color:#fff; display:flex; align-items:center; justify-content:center; gap:10px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 127.14 96.36" fill="#fff"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg> 使用 Discord 登入
            </button>
        </div>
    </div>
    <div id="user-info" style="display:none;"></div>
    <script>
        const pb = new PocketBase('https://vppb.zeabur.app');

        async function login(m) {
            const authData = await pb.collection('users').authWithOAuth2({ provider: m });
            if (pb.authStore.isValid) {
                userData = pb.authStore.model;
                showUserInfo(userData);
            } else {
                alert("登入失敗！")
            }
        }

        function showUserInfo(userData) {
            document.getElementById('login-card').style.display = 'none';
            const userInfoDiv = document.getElementById('user-info');
            const avatarUrl = pb.files.getUrl(userData, userData.avatar);
            userInfoDiv.innerHTML = `
                <div style=\"display:flex; flex-direction:column; align-items:center; gap:16px;\">
                    <img src=\"${avatarUrl}\" alt=\"頭像\" style=\"width:80px; height:80px; border-radius:50%; box-shadow:0 2px 8px #0001;\">
                    <div style=\"font-size:20px; font-weight:600; color:#222;\">${userData.name || userData.username || '使用者'}</div>
                    <div style=\"font-size:18px; margin-top:8px; color:#333;\">這是你嗎？</div>
                    <div style=\"display:flex; gap:16px; margin-top:8px;\">
                        <button onclick=\"confirmUser()\" class=\"login-btn\" style=\"width:80px; background:#1a1a1a; color:#fff;\">是</button>
                        <button onclick=\"notUser()\" class=\"login-btn\" style=\"width:80px; background:#e0e0e0; color:#333;\">否</button>
                    </div>
                </div>
            `;

            userInfoDiv.style.display = 'block';
        }
        function notUser() {
            pb.authStore.clear();
            location.reload();
        }
        function confirmUser() {
            location.href = `vocpass://auth?token=${pb.authStore.token}`;
        }

        async function checkAuth() {
            if (pb.authStore.isValid) {
                const userData = pb.authStore.model;
                console.log("已登入：", userData);
                showUserInfo(userData);
            }
        }
        checkAuth();

    </script>
</body>

</html>
