<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocPass | 我的帳號</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://github.com/vocpass.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.25.0/pocketbase.umd.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Noto Sans TC"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --apple-text: #1d1d1f;
            --apple-secondary: #86868b;
            --bg-gray: #fbfbfd;
        }
        body { background-color: var(--bg-gray); color: var(--apple-text); }

        .glass-nav {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .bento-card {
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.03);
        }
    </style>
</head>

<body class="antialiased overflow-x-hidden">

    <nav class="glass-nav fixed w-full z-50 transition-all duration-300 h-14 flex items-center">
        <div class="max-w-7xl mx-auto px-5 w-full flex justify-between items-center">
            <a href="/" class="flex items-center gap-2.5 cursor-pointer">
                <img src="https://github.com/vocpass.png" alt="VocPass" class="w-7 h-7 rounded-[8px] object-cover shadow-sm">
                <span class="font-bold text-lg tracking-tight">VocPass</span>
            </a>
            <div class="hidden md:flex items-center gap-7">
                <a href="/#features" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">特色</a>
                <a href="/#schools" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">支援學校</a>
                <a href="https://github.com/VocPass" target="_blank" class="text-gray-400 hover:text-gray-900 transition-colors">
                    <i class="fa-brands fa-github text-xl"></i>
                </a>
            </div>
        </div>
    </nav>

    <div class="min-h-screen flex items-center justify-center px-5 pt-14">
        <div class="w-full max-w-sm">

            <!-- 已登入：使用者資訊 -->
            <div id="user-card" class="hidden bento-card p-8 text-center">
                <img id="user-avatar" src="" alt="頭像" class="w-20 h-20 rounded-full mx-auto mb-4 object-cover"
                    style="border:3px solid #fbfbfd;">
                <h1 id="user-name" class="text-2xl font-bold tracking-tight mb-1"></h1>
                <p id="user-email" class="mb-6 text-gray-500 text-[15px]"></p>

                <div id="user-meta" class="space-y-2 text-left mb-6"></div>

                <button onclick="logout()"
                    class="w-full px-5 py-3.5 rounded-full font-semibold text-[15px] bg-gray-100 text-gray-900 hover:bg-red-50 hover:text-red-600 transition-all">
                    <i class="fa-solid fa-right-from-bracket mr-2"></i>登出
                </button>
            </div>

            <!-- 未登入 -->
            <div id="guest-card" class="hidden bento-card p-8 text-center">
                <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4 bg-blue-50 text-blue-600">
                    <i class="fa-solid fa-user-slash"></i>
                </div>
                <h1 class="font-semibold mb-2 text-[20px]">尚未登入</h1>
                <p class="mb-6 text-gray-500 text-[15px]">請先登入以查看您的帳號資訊</p>
                <a href="/auth?web=1"
                    class="block w-full px-5 py-3.5 rounded-full font-semibold text-center text-[15px] bg-blue-600 text-white hover:bg-blue-700 transition-colors">
                    前往登入
                </a>
            </div>

        </div>
    </div>

    <footer class="border-t border-gray-200 bg-white py-10 px-5 mt-20">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 md:gap-6">
            <div class="flex items-center gap-3">
                <img src="https://github.com/vocpass.png" alt="VocPass" class="w-8 h-8 rounded-lg grayscale opacity-70">
                <p class="text-gray-500 text-sm font-medium">© 2026 VocPass. 開源於 <a href="https://github.com/VocPass/ios/blob/main/LICENSE" class="text-gray-800 font-semibold underline">GPL 3.0</a>.</p>
            </div>
            <div class="flex flex-wrap justify-center items-center gap-4 md:gap-6 text-sm text-gray-500 font-medium">
                <a href="/privacy-policy" class="hover:text-gray-900 transition-colors">隱私權政策</a>
                <a href="/disclaimer" class="hover:text-gray-900 transition-colors">免責聲明</a>
                <div class="w-px h-4 bg-gray-300 hidden sm:block"></div>
                <a href="https://forum.vocpass.com/" target="_blank" class="hover:text-gray-900 transition-colors"><i class="fa-solid fa-bug mr-1"></i> 回報問題</a>
                <a href="https://dc.vocpass.com/" target="_blank" class="hover:text-gray-900 transition-colors"><i class="fa-solid fa-commenting mr-1"></i> 加入 Discord</a>
            </div>
        </div>
    </footer>

    <script>
        const pb = new PocketBase('https://vppb.zeabur.app');

        function escapeHTML(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function logout() {
            pb.authStore.clear();
            location.reload();
        }

        function renderMeta(key, label, icon) {
            return `
                <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gray-50">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center text-sm flex-shrink-0 bg-blue-50 text-blue-600">
                        <i class="${icon}"></i>
                    </div>
                    <div class="min-w-0">
                        <p class="text-xs font-medium text-gray-500">${label}</p>
                        <p class="text-sm font-semibold truncate">${escapeHTML(key)}</p>
                    </div>
                </div>
            `;
        }

        function renderCurriculumStatus(enabled) {
            const color = enabled ? '#1a7f4e' : '#6e6e73';
            const label = enabled ? '已開啟' : '未開啟';
            const bgColor = enabled ? '#e6f9f0' : '#f5f5f7';
            return `
                <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gray-50">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center text-sm flex-shrink-0"
                        style="background:${bgColor}; color:${color};">
                        <i class="fa-solid fa-table-cells"></i>
                    </div>
                    <div class="min-w-0 flex-1">
                        <p class="text-xs font-medium text-gray-500">共享課表</p>
                        <p class="text-sm font-semibold" style="color:${color};">${label}</p>
                    </div>
                </div>
            `;
        }

        async function checkAuth() {
            if (pb.authStore.isValid) {
                await pb.collection('users').authRefresh();
                const user = pb.authStore.model;
                const avatarUrl = user.avatar ? pb.files.getUrl(user, user.avatar) : 'https://github.com/vocpass.png';

                document.getElementById('user-avatar').src = avatarUrl;
                document.getElementById('user-name').textContent = user.name || user.username || '使用者';
                document.getElementById('user-email').textContent = user.email || '';

                const meta = [];
                if (user.username) meta.push(renderMeta(user.username, '使用者名稱', 'fa-solid fa-at'));
                if (user.verified) meta.push(renderMeta('已驗證', '帳號狀態', 'fa-solid fa-circle-check'));
                meta.push(renderCurriculumStatus(user.curriculum_status));
                const joined = user.created ? new Date(user.created).toLocaleDateString('zh-TW') : '';
                if (joined) meta.push(renderMeta(joined, '加入時間', 'fa-regular fa-calendar'));

                document.getElementById('user-meta').innerHTML = meta.join('');
                document.getElementById('user-card').classList.remove('hidden');
            } else {
                document.getElementById('guest-card').classList.remove('hidden');
            }
        }
        checkAuth();

        const nav = document.querySelector('nav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                nav.classList.add('shadow-sm');
                nav.style.background = 'rgba(255, 255, 255, 0.85)';
            } else {
                nav.classList.remove('shadow-sm');
                nav.style.background = 'rgba(255, 255, 255, 0.65)';
            }
        });
    </script>

</body>

</html>
