<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocPass | 我的帳號</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="https://github.com/vocpass.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.25.0/pocketbase.umd.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Noto Sans TC"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-text: #1d1d1f;
            --apple-secondary: #6e6e73;
        }

        .apple-nav {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .logout-btn {
            background: rgba(0, 0, 0, 0.06);
            color: #1d1d1f;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .logout-btn:hover {
            background: #fff0f0;
            color: #d93025;
        }
    </style>
</head>

<body style="background:#f5f5f7; color:#1d1d1f;" class="antialiased overflow-x-hidden">

    <!-- 導覽列 -->
    <nav class="apple-nav fixed w-full z-50 transition-all duration-300" style="height:44px;">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full">
            <div class="flex justify-between h-full items-center">
                <a href="/" class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                    <img src="https://github.com/vocpass.png" alt="VocPass" class="w-6 h-6 rounded-md object-cover">
                    <span class="font-semibold text-sm tracking-tight" style="color:#1d1d1f;">VocPass</span>
                </a>
                <div class="hidden md:flex items-center gap-6">
                    <a href="/#features" class="text-sm transition-colors" style="color:#6e6e73;">功能特色</a>
                    <a href="/#schools" class="text-sm transition-colors" style="color:#6e6e73;">支援學校</a>
                    <a href="/#install" class="text-sm transition-colors" style="color:#6e6e73;">立即下載</a>
                    <a href="https://github.com/VocPass" target="_blank"
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold"
                        style="background:#1d1d1f; color:#fff;">
                        <i class="fa-brands fa-github"></i> GitHub
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主內容 -->
    <div class="min-h-screen flex items-center justify-center px-4" style="padding-top:44px;">
        <div class="w-full max-w-sm">

            <!-- 已登入：使用者資訊 -->
            <div id="user-card" class="hidden bg-white rounded-2xl p-8 text-center"
                style="box-shadow:0 4px 24px rgba(0,0,0,0.06);">
                <img id="user-avatar" src="" alt="頭像" class="w-20 h-20 rounded-full mx-auto mb-4 object-cover"
                    style="border:3px solid #f5f5f7;">
                <h1 id="user-name" class="text-2xl font-bold tracking-tight mb-1"
                    style="color:#1d1d1f; letter-spacing:-0.02em;"></h1>
                <p id="user-email" class="mb-6" style="color:#6e6e73; font-size:15px;"></p>

                <div id="user-meta" class="space-y-2 text-left mb-6"></div>

                <button onclick="logout()" class="logout-btn w-full px-5 py-3.5 rounded-full font-semibold"
                    style="font-size:15px;">
                    <i class="fa-solid fa-right-from-bracket mr-2"></i>登出
                </button>
            </div>

            <!-- 未登入 -->
            <div id="guest-card" class="hidden bg-white rounded-2xl p-8 text-center"
                style="box-shadow:0 4px 24px rgba(0,0,0,0.06);">
                <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4"
                    style="background:#e4f3ff; color:#0071e3;">
                    <i class="fa-solid fa-user-slash"></i>
                </div>
                <h1 class="font-semibold mb-2" style="color:#1d1d1f; font-size:20px;">尚未登入</h1>
                <p class="mb-6" style="color:#6e6e73; font-size:15px;">請先登入以查看您的帳號資訊</p>
                <a href="/auth?web=1"
                    class="block w-full px-5 py-3.5 rounded-full font-semibold text-center transition-colors"
                    style="font-size:15px;" style="background:#0071e3; color:#fff;">
                    前往登入
                </a>
            </div>

        </div>
    </div>

    <script>
        const pb = new PocketBase('https://vppb.zeabur.app');

        function logout() {
            pb.authStore.clear();
            location.reload();
        }

        function renderMeta(key, label, icon) {
            return `
                <div class="flex items-center gap-3 px-4 py-3 rounded-xl" style="background:#f5f5f7;">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center text-sm flex-shrink-0"
                        style="background:#e4f3ff; color:#0071e3;">
                        <i class="${icon}"></i>
                    </div>
                    <div class="min-w-0">
                        <p class="text-xs font-medium" style="color:#6e6e73;">${label}</p>
                        <p class="text-sm font-semibold truncate" style="color:#1d1d1f;">${key}</p>
                    </div>
                </div>
            `;
        }

        function renderCurriculumStatus(enabled) {
            const color = enabled ? '#1a7f4e' : '#6e6e73';
            const icon = enabled ? 'fa-solid fa-table-cells' : 'fa-solid fa-table-cells';
            const label = enabled ? '已開啟' : '未開啟';
            const bgColor = enabled ? '#e6f9f0' : '#f5f5f7';
            return `
                <div class="flex items-center gap-3 px-4 py-3 rounded-xl" style="background:#f5f5f7;">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center text-sm flex-shrink-0"
                        style="background:${bgColor}; color:${color};">
                        <i class="${icon}"></i>
                    </div>
                    <div class="min-w-0 flex-1">
                        <p class="text-xs font-medium" style="color:#6e6e73;">共享課表</p>
                        <p class="text-sm font-semibold" style="color:${color};">${label}</p>
                    </div>
                </div>
            `;
        }
        async function checkAuth() {
            if (pb.authStore.isValid) {
                await pb.collection('users').authRefresh();
                const user = pb.authStore.model;
                const avatarUrl = user.avatar ? pb.files.getUrl(user, user.avatar) : 'https://github.com/vocpass.png';

                document.getElementById('user-avatar').src = avatarUrl;
                document.getElementById('user-name').textContent = user.name || user.username || '使用者';
                document.getElementById('user-email').textContent = user.email || '';

                const meta = [];
                if (user.username) meta.push(renderMeta(user.username, '使用者名稱', 'fa-solid fa-at'));
                if (user.verified) meta.push(renderMeta('已驗證', '帳號狀態', 'fa-solid fa-circle-check'));
                meta.push(renderCurriculumStatus(user.curriculum_status));
                const joined = user.created ? new Date(user.created).toLocaleDateString('zh-TW') : '';
                if (joined) meta.push(renderMeta(joined, '加入時間', 'fa-regular fa-calendar'));

                document.getElementById('user-meta').innerHTML = meta.join('');
                document.getElementById('user-card').classList.remove('hidden');
            } else {
                document.getElementById('guest-card').classList.remove('hidden');
            }
        }
        checkAuth();
    </script>

</body>

</html>
