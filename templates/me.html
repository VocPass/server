<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocPass | 我的帳號</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://github.com/vocpass.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.25.0/pocketbase.umd.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .hero-pattern {
            background-color: #f0f4ff;
            background-image: radial-gradient(#c7d2fe 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased overflow-x-hidden">

    <!-- 導覽列 -->
    <nav class="fixed w-full z-50 glass-nav border-b border-indigo-100 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="/" class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                    <img src="https://github.com/vocpass.png" alt="VocPass"
                        class="w-8 h-8 rounded-lg object-cover border border-indigo-200">
                    <span class="font-bold text-xl tracking-wider">VocPass</span>
                </a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="/#features" class="text-gray-600 hover:text-indigo-600 transition-colors">功能特色</a>
                    <a href="/#schools" class="text-gray-600 hover:text-indigo-600 transition-colors">支援學校</a>
                    <a href="/#install" class="text-gray-600 hover:text-indigo-600 transition-colors">立即下載</a>
                    <a href="https://github.com/VocPass" target="_blank"
                        class="flex items-center gap-2 px-4 py-2 bg-slate-900 text-white rounded-full text-sm font-medium hover:bg-slate-700 transition-colors">
                        <i class="fa-brands fa-github"></i> GitHub
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主內容 -->
    <div class="hero-pattern min-h-screen flex items-center justify-center px-4 pt-16">
        <div class="w-full max-w-sm">

            <!-- 已登入：使用者資訊 -->
            <div id="user-card" class="hidden bg-white rounded-3xl border border-slate-200 shadow-sm p-8 text-center">
                <img id="user-avatar" src="" alt="頭像"
                    class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-indigo-100 shadow-md object-cover">
                <h1 id="user-name" class="text-2xl font-black text-slate-900 mb-1"></h1>
                <p id="user-email" class="text-slate-500 text-sm mb-6"></p>

                <div id="user-meta" class="space-y-3 text-left mb-6"></div>

                <button onclick="logout()"
                    class="w-full px-5 py-3 bg-slate-100 text-slate-700 rounded-2xl font-semibold hover:bg-red-50 hover:text-red-600 transition-colors">
                    <i class="fa-solid fa-right-from-bracket mr-2"></i>登出
                </button>
            </div>

            <!-- 未登入 -->
            <div id="guest-card" class="hidden bg-white rounded-3xl border border-slate-200 shadow-sm p-8 text-center">
                <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-500 text-3xl mx-auto mb-4">
                    <i class="fa-solid fa-user-slash"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-900 mb-2">尚未登入</h1>
                <p class="text-slate-500 text-sm mb-6">請先登入以查看您的帳號資訊</p>
                <a href="/auth?web=1"
                    class="block w-full px-5 py-3 bg-indigo-600 text-white rounded-2xl font-semibold hover:bg-indigo-500 transition-colors">
                    前往登入
                </a>
            </div>

        </div>
    </div>

    <script>
        const pb = new PocketBase('https://vppb.zeabur.app');

        function logout() {
            pb.authStore.clear();
            location.reload();
        }

        function renderMeta(key, label, icon) {
            return `
                <div class="flex items-center gap-3 px-4 py-3 bg-slate-50 rounded-xl">
                    <div class="w-8 h-8 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-500 text-sm flex-shrink-0">
                        <i class="${icon}"></i>
                    </div>
                    <div class="min-w-0">
                        <p class="text-xs text-slate-400 font-medium">${label}</p>
                        <p class="text-sm font-semibold text-slate-700 truncate">${key}</p>
                    </div>
                </div>
            `;
        }

        function renderCurriculumStatus(enabled) {
            const color = enabled ? 'text-emerald-500' : 'text-slate-400';
            const icon = enabled ? 'fa-solid fa-table-cells' : 'fa-solid fa-table-cells';
            const label = enabled ? '已開啟' : '未開啟';
            return `
                <div class="flex items-center gap-3 px-4 py-3 bg-slate-50 rounded-xl">
                    <div class="w-8 h-8 bg-indigo-50 rounded-lg flex items-center justify-center ${color} text-sm flex-shrink-0">
                        <i class="${icon}"></i>
                    </div>
                    <div class="min-w-0 flex-1">
                        <p class="text-xs text-slate-400 font-medium">共享課表</p>
                        <p class="text-sm font-semibold ${color}">${label}</p>
                    </div>
                </div>
            `;
        }

        if (pb.authStore.isValid) {
            const user = pb.authStore.model;
            const avatarUrl = user.avatar ? pb.files.getUrl(user, user.avatar) : 'https://github.com/vocpass.png';

            document.getElementById('user-avatar').src = avatarUrl;
            document.getElementById('user-name').textContent = user.name || user.username || '使用者';
            document.getElementById('user-email').textContent = user.email || '';

            const meta = [];
            if (user.username) meta.push(renderMeta(user.username, '使用者名稱', 'fa-solid fa-at'));
            if (user.verified) meta.push(renderMeta('已驗證', '帳號狀態', 'fa-solid fa-circle-check'));
            meta.push(renderCurriculumStatus(user.curriculum_status));
            const joined = user.created ? new Date(user.created).toLocaleDateString('zh-TW') : '';
            if (joined) meta.push(renderMeta(joined, '加入時間', 'fa-regular fa-calendar'));

            document.getElementById('user-meta').innerHTML = meta.join('');
            document.getElementById('user-card').classList.remove('hidden');
        } else {
            document.getElementById('guest-card').classList.remove('hidden');
        }
    </script>

</body>

</html>
