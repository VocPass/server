<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include "partials/seo.html" %}
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Noto Sans TC"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --apple-text: #1d1d1f;
            --apple-secondary: #86868b;
            --bg-gray: #fbfbfd;
        }
        body { background-color: var(--bg-gray); color: var(--apple-text); }

        .glass-nav {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .bento-card {
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.03);
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            border-radius: 12px;
            font-size: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", system-ui, sans-serif;
            color: #1d1d1f;
            background: #fff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        input::placeholder { color: #c7c7cc; }
    </style>
</head>
<body class="antialiased overflow-x-hidden">
    {% include "partials/nav.html" %}

    <div class="min-h-screen flex items-center justify-center px-5 pt-14">
        <div class="w-full max-w-sm">
            <div class="bento-card p-8">
                <div class="text-center mb-8">
                    <img src="https://cdn.vocpass.com/iconr.png" alt="VocPass"
                        class="w-14 h-14 rounded-2xl object-cover mx-auto mb-4 shadow-sm">
                    <h1 class="text-2xl font-bold tracking-tight mb-1">登入</h1>
                    <p class="text-sm text-gray-500">請輸入您的帳號與密碼</p>
                </div>

                <form action="#" method="post" class="space-y-4">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1.5">帳號</label>
                        <input type="text" id="username" placeholder="請輸入帳號" required>
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">密碼</label>
                        <input type="password" id="password" placeholder="請輸入密碼" required>
                    </div>
                    <button type="submit"
                        class="w-full py-3.5 bg-blue-600 text-white rounded-full font-semibold text-[15px] hover:bg-blue-700 transition-colors mt-2">
                        登入
                    </button>
                </form>
            </div>
        </div>
    </div>
    {% include "partials/footer.html" %}

    <script>
        const nav = document.querySelector('nav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                nav.classList.add('shadow-sm');
                nav.style.background = 'rgba(255, 255, 255, 0.85)';
            } else {
                nav.classList.remove('shadow-sm');
                nav.style.background = 'rgba(255, 255, 255, 0.65)';
            }
        });
    </script>
</body>
</html>
