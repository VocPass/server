<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", system-ui, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1d1d1f;
        }

        .login-card {
            background-color: #ffffff;
            padding: 40px 36px;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            width: 90%;
            max-width: 360px;
        }

        .login-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .login-logo img {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            object-fit: cover;
        }

        .login-card h2 {
            margin: 0 0 6px 0;
            text-align: center;
            color: #1d1d1f;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .login-subtitle {
            text-align: center;
            color: #6e6e73;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #1d1d1f;
            font-size: 13px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            font-size: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", system-ui, sans-serif;
            color: #1d1d1f;
            background: #fff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #0071e3;
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
        }

        .input-group input::placeholder {
            color: #c7c7cc;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #0071e3;
            color: #ffffff;
            border: none;
            border-radius: 980px;
            font-size: 15px;
            font-weight: 600;
            font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", system-ui, sans-serif;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 8px;
            letter-spacing: -0.01em;
        }

        .login-btn:hover {
            background-color: #0077ed;
        }

        .login-btn:active {
            background-color: #006edb;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-logo">
            <img src="https://github.com/vocpass.png" alt="VocPass">
        </div>
        <h2>登入</h2>
        <p class="login-subtitle">請輸入您的帳號與密碼</p>
        <form action="#" method="post">
            <div class="input-group">
                <label for="username">帳號</label>
                <input type="text" id="username" placeholder="請輸入帳號" required>
            </div>

            <div class="input-group">
                <label for="password">密碼</label>
                <input type="password" id="password" placeholder="請輸入密碼" required>
            </div>

            <button type="submit" class="login-btn">登入</button>
        </form>
    </div>

</body>
</html>
