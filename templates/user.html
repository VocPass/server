<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocPass | 個人資料</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://github.com/vocpass.png">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Noto Sans TC"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-text: #1d1d1f;
            --apple-secondary: #6e6e73;
        }
        .apple-nav {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body style="background:#f5f5f7; color:#1d1d1f;" class="antialiased overflow-x-hidden">

    <!-- 導覽列 -->
    <nav class="apple-nav fixed w-full z-50 transition-all duration-300" style="height:44px;">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full">
            <div class="flex justify-between h-full items-center">
                <a href="/" class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                    <img src="https://github.com/vocpass.png" alt="VocPass"
                        class="w-6 h-6 rounded-md object-cover">
                    <span class="font-semibold text-sm tracking-tight" style="color:#1d1d1f;">VocPass</span>
                </a>
                <a href="/" class="flex items-center gap-1.5 text-sm transition-colors" style="color:#0071e3;">
                    <i class="fa-solid fa-chevron-left text-xs"></i>
                    返回首頁
                </a>
            </div>
        </div>
    </nav>

    <!-- 主內容 -->
    <div class="min-h-screen px-4 pb-12" style="padding-top:calc(44px + 24px);">
        <div class="w-full max-w-2xl mx-auto">

            <!-- 載入中 -->
            <div id="loading-card" class="flex flex-col items-center justify-center py-24" style="color:#6e6e73;">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-4" style="color:#0071e3;"></i>
                <p class="text-sm">載入中...</p>
            </div>

            <!-- 找不到使用者 -->
            <div id="not-found-card" class="hidden bg-white rounded-2xl p-10 text-center"
                style="box-shadow:0 4px 24px rgba(0,0,0,0.06);">
                <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4"
                    style="background:#ffeaea; color:#d93025;">
                    <i class="fa-solid fa-user-xmark"></i>
                </div>
                <h1 class="font-semibold mb-2" style="color:#1d1d1f; font-size:19px;">找不到此使用者</h1>
                <p style="color:#6e6e73; font-size:15px;">該使用者不存在或帳號已停用</p>
            </div>

            <!-- 使用者資料 -->
            <div id="user-card" class="hidden space-y-4">

                <!-- 個人資訊 -->
                <div class="bg-white rounded-2xl p-8 text-center"
                    style="box-shadow:0 4px 24px rgba(0,0,0,0.06);">
                    <img id="user-avatar" src="" alt="頭像"
                        class="w-20 h-20 rounded-full mx-auto mb-4 object-cover"
                        style="border:3px solid #f5f5f7;">
                    <h1 id="user-name" class="text-2xl font-bold tracking-tight mb-1"
                        style="color:#1d1d1f; letter-spacing:-0.02em;"></h1>
                    <p id="user-username" class="font-medium" style="color:#6e6e73; font-size:15px;"></p>

                    <div id="curriculum-badge"
                        class="hidden mt-4 inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-sm font-semibold"
                        style="background:#e6f9f0; color:#1a7f4e;">
                        <i class="fa-solid fa-table-cells"></i>
                        已共享課表
                    </div>
                </div>

                <!-- 課表 -->
                <div id="curriculum-section" class="hidden bg-white rounded-2xl p-6"
                    style="box-shadow:0 4px 24px rgba(0,0,0,0.06);">
                    <h2 class="font-semibold mb-4 flex items-center gap-2"
                        style="color:#1d1d1f; font-size:17px;">
                        <i class="fa-solid fa-table-cells" style="color:#0071e3;"></i>
                        課表
                    </h2>
                    <div id="curriculum-table" class="overflow-x-auto">
                        <table class="w-full text-sm border-collapse">
                            <thead>
                                <tr id="table-header"></tr>
                            </thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const WEEKDAYS = ['一', '二', '三', '四', '五'];
        const WEEKDAY_LABELS = { '一': '週一', '二': '週二', '三': '週三', '四': '週四', '五': '週五' };
        const PERIOD_ORDER = { '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10 };

        function getUsername() {
            const path = window.location.pathname;
            const match = path.match(/^\/@(.+)$/);
            return match ? match[1] : null;
        }

        function buildTimetable(curriculum) {
            // Collect all periods and weekdays used
            const periodsSet = new Set();
            const weekdaysUsed = new Set();
            const cellMap = {}; // "weekday-period" -> [{subject, room, teacher}]

            for (const [subject, info] of Object.entries(curriculum)) {
                for (const slot of info.schedule) {
                    const key = `${slot.weekday}-${slot.period}`;
                    periodsSet.add(slot.period);
                    weekdaysUsed.add(slot.weekday);
                    if (!cellMap[key]) cellMap[key] = [];
                    cellMap[key].push({ subject, room: slot.room, teacher: slot.teacher });
                }
            }

            const periods = [...periodsSet].sort((a, b) => (PERIOD_ORDER[a] || 99) - (PERIOD_ORDER[b] || 99));
            const weekdays = WEEKDAYS.filter(d => weekdaysUsed.has(d));

            // Header
            const header = document.getElementById('table-header');
            header.innerHTML = `<th class="py-2 px-2 text-left text-xs font-semibold w-10" style="color:#6e6e73;">節次</th>` +
                weekdays.map(d => `<th class="py-2 px-2 text-center text-xs font-semibold" style="color:#1d1d1f;">${WEEKDAY_LABELS[d]}</th>`).join('');

            // Body
            const tbody = document.getElementById('table-body');
            const colors = [
                'bg-indigo-50 text-indigo-700',
                'bg-violet-50 text-violet-700',
                'bg-sky-50 text-sky-700',
                'bg-emerald-50 text-emerald-700',
                'bg-amber-50 text-amber-700',
                'bg-rose-50 text-rose-700',
                'bg-teal-50 text-teal-700',
                'bg-pink-50 text-pink-700',
                'bg-orange-50 text-orange-700',
                'bg-cyan-50 text-cyan-700',
            ];
            const subjectColorMap = {};
            let colorIndex = 0;
            function getColor(subject) {
                if (!subjectColorMap[subject]) {
                    subjectColorMap[subject] = colors[colorIndex % colors.length];
                    colorIndex++;
                }
                return subjectColorMap[subject];
            }

            tbody.innerHTML = periods.map(period => {
                const cells = weekdays.map(day => {
                    const key = `${day}-${period}`;
                    const entries = cellMap[key];
                    if (!entries || entries.length === 0) {
                        return `<td class="p-1 align-top min-w-[90px]" style="height:1px"><div class="h-full rounded-xl" style="background:#f5f5f7;"></div></td>`;
                    }
                    const inner = entries.map(e => {
                        const color = getColor(e.subject);
                        const roomLine = e.room ? `<span class="block text-xs opacity-60 truncate">${e.room}</span>` : '';
                        return `<div class="rounded-xl px-2 py-1.5 mb-1 last:mb-0 ${color}">
                            <span class="block font-semibold leading-tight text-xs">${e.subject}</span>
                            ${roomLine}
                        </div>`;
                    }).join('');
                    return `<td class="p-1 align-top min-w-[90px]" style="height:1px"><div class="h-full flex flex-col justify-start">${inner}</div></td>`;
                }).join('');
                return `<tr style="border-top:1px solid rgba(0,0,0,0.06);">
                    <td class="py-2 px-2 text-center text-xs font-bold align-top pt-3" style="color:#6e6e73;">${period}</td>
                    ${cells}
                </tr>`;
            }).join('');
        }

        async function loadUser() {
            const username = getUsername();
            if (!username) {
                document.getElementById('loading-card').classList.add('hidden');
                document.getElementById('not-found-card').classList.remove('hidden');
                return;
            }

            document.title = `VocPass | @${username}`;

            try {
                const res = await fetch(`/api/user/${encodeURIComponent(username)}`);
                const json = await res.json();

                document.getElementById('loading-card').classList.add('hidden');

                if (json.code !== 200 || !json.data) {
                    document.getElementById('not-found-card').classList.remove('hidden');
                    return;
                }

                const user = json.data;
                document.title = `VocPass | ${user.name || user.username}`;

                document.getElementById('user-avatar').src = user.avatar || 'https://github.com/vocpass.png';
                document.getElementById('user-name').textContent = user.name || user.username;
                document.getElementById('user-username').textContent = `@${user.username}`;

                if (user.curriculum_status) {
                    document.getElementById('curriculum-badge').classList.remove('hidden');
                }

                if (user.curriculum_status && user.curriculum && Object.keys(user.curriculum).length > 0) {
                    document.getElementById('curriculum-section').classList.remove('hidden');
                    buildTimetable(user.curriculum);
                }

                document.getElementById('user-card').classList.remove('hidden');
            } catch (e) {
                document.getElementById('loading-card').classList.add('hidden');
                document.getElementById('not-found-card').classList.remove('hidden');
            }
        }

        loadUser();
    </script>

</body>

</html>
